<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NASA Space Explorer</title>
<link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
<div class="container">
<header class="site-header">
<div class="nasa-badge">NASA</div>
<h1>Space Explorer</h1>
</header>

<div class="filters">
<input type="date" id="startDate" />
<input type="date" id="endDate" />
<button id="getBtn">Get Space Images</button>
</div>

<div id="fact-box" class="fact-box"></div>

<div id="loading-msg" class="loading-msg hidden">Loading space photos...</div>

<div id="gallery" class="gallery">
<div class="placeholder">
<div class="placeholder-icon">Explore</div>
<p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
</div>
</div>

<div id="modal" class="modal hidden">
<div class="modal-content">
<span id="modal-close" class="modal-close">&times;</span>
<div id="modal-body"></div>
</div>
</div>
</div>

<script src="js/dateRange.js"></script>
<script src="js/script.js"></script>
</body>
</html>
