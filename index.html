<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA Space Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  </head>
  <body>

  <header class="site-header">
    <div class="nasa-badge">NASA</div>
    <h1>Space Explorer</h1>
    <p class="subtitle">Discover the cosmos, one day at a time</p>
</header>

<main>
  <section class="filters">
    <label for="start-date">Start Date</label>
    <input type="date" id="start-date">
      <button id="get-images-btn">Get Space Images</button>
  </section>

  <section class="fact-box" id="fact-box"></section>

  <div id="loading-msg" class="loading-msg hidden">Loading space photos...</div>

    <section id="gallery" class="gallery"></section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span id="modal-close" class="modal-close">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="script.js"></script>
  </body>
  </html>
